# portwatch example configuration
# Copy this file to portwatch.yaml and adjust to your environment.

watch:
  interval: 15s
  debounce_seconds: 2

pipeline:
  sort:
    field: port
    descending: false
  filter:
    exclude_loopback: true
    exclude_ports: []

output:
  format: text   # text | json

alert:
  enabled: true
  # log_level controls the severity used when logging unexpected listeners.
  # Valid values: info, warn, error
  log_level: warn
  # include_process attaches process name/PID to alert messages when available.
  include_process: true
  # dedup_window_seconds suppresses duplicate alerts for the same listener
  # within this window. Set to 0 to disable deduplication.
  dedup_window_seconds: 60

rules:
  # Allow SSH on all interfaces
  - name: allow-ssh
    action: allow
    protocol: tcp
    port: 22

  # Allow HTTP/HTTPS
  - name: allow-http
    action: allow
    protocol: tcp
    port: 80

  - name: allow-https
    action: allow
    protocol: tcp
    port: 443

  # Deny everything else (implicit if no rule matches — this is explicit)
  - name: deny-rest
    action: deny
